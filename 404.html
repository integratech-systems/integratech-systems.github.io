<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — IntegraTech Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body data-page="404">
  <div class="not-found">
    <div>
      <p style="font-size:4rem;margin:0">404</p>
      <h1 data-i18n="404.h1" style="font-size:2rem;margin:.5rem 0 1rem">Page not found</h1>
      <p style="color:var(--muted);margin-bottom:2rem" data-i18n="404.desc">
        This integration endpoint doesn't exist (yet).
      </p>
      <a data-i18n="404.back" class="button primary" href="index.html">← Back to home</a>
    </div>
  </div>
  <script src="assets/i18n.js"></script>

  <!-- IntegraTech Visitor Tracker — pixel + heartbeat -->
  <script>
  (function() {
    var _base = 'https://openstreaming.online/track/px';
    var _sid  = Math.random().toString(36).substr(2, 12);
    var _page = location.pathname.replace(/\/index\.html$/, '/') || '/';
    var _lang = (navigator.language || '').substr(0, 5);
    var _fired = false;

    function _px(ev) {
      var url = _base
        + '?e=' + ev
        + '&s=' + encodeURIComponent(_sid)
        + '&p=' + encodeURIComponent(_page)
        + '&l=' + encodeURIComponent(_lang)
        + '&_=' + Date.now();
      new Image().src = url;
    }

    // Initial view event (after small delay so page is fully rendered)
    setTimeout(function() {
      if (!_fired) { _fired = true; _px('view'); }
    }, 800);

    // Heartbeat every 30s to track time-on-site
    var _hb = setInterval(function() { _px('ping'); }, 30000);

    // Exit event
    window.addEventListener('beforeunload', function() {
      clearInterval(_hb);
      _px('exit');
    });
  }());
  </script>
  <!-- End Tracker -->
</body>
</html>
